services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agriscan
      POSTGRES_USER: agriscan_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-agriscan_pass}
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U agriscan_user -d agriscan" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: sh -c "python manage.py makemigrations && python manage.py migrate && python manage.py runserver 0.0.0.0:8080"
    volumes:
      - ./backend:/app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_ENGINE=postgresql
      - DB_NAME=agriscan
      - DB_USER=agriscan_user
      - DB_HOST=db
      - DB_PORT=5432
      - DB_PASSWORD=${DB_PASSWORD:-agriscan_pass}
      - SECRET_KEY=${SECRET_KEY:-insecure-secret-key}
      - DEBUG=True
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - backend/.env

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:8080/api
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_BASE_URL=http://localhost:8080/api
      - PORT=5173

volumes:
  postgres_data:
