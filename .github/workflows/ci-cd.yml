name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check for file changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/**'
            frontend:
              - 'frontend/**'
              - '.github/workflows/**'

  backend-test:
    needs: changes
    # Run if backend files changed, or if manually triggered
    if: ${{ needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pip-audit

      - name: Run dependency scan (backend)
        run: |
          python backend/scripts/run_dependency_audit.py

      - name: Run backend tests
        working-directory: backend
        env:
          DB_ENGINE: sqlite
          DEBUG: "False"
          SECRET_KEY: ci-test-secret-key-32-chars-minimum-length-for-jwt
          ALLOWED_HOSTS: localhost,127.0.0.1
          USE_LOCAL_MEMORY_CACHE: "True"
        run: |
          python manage.py test accounts.tests core.tests samples.tests

      - name: Run backend deploy smoke checks
        working-directory: backend
        env:
          DB_ENGINE: sqlite
          DEBUG: "False"
          SECRET_KEY: ci-test-secret-key-32-chars-minimum-length-for-jwt
          ALLOWED_HOSTS: localhost,127.0.0.1
          USE_LOCAL_MEMORY_CACHE: "True"
        run: |
          bash -n .platform/hooks/predeploy/01_django_setup.sh
          bash -n .platform/hooks/postdeploy/01_start_celery.sh
          python manage.py check
          python manage.py collectstatic --noinput
          python - <<'PY'
          import os

          os.environ.setdefault("DJANGO_SETTINGS_MODULE", "core.settings")
          import django
          django.setup()

          from django.test import Client

          client = Client(HTTP_HOST="ec2-1-2-3-4.ap-southeast-1.compute.amazonaws.com")
          response = client.get("/health/")
          assert response.status_code == 200, response.content.decode()
          print("Health check host OK")
          PY
          python -c "from core.wsgi import application; print('WSGI import OK')"
          python -c "from core.celery import app; print('Celery import OK')"

  frontend-test:
    needs: changes
    # Run if frontend files changed, or if manually triggered
    if: ${{ needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run dependency scan (frontend)
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Run frontend smoke tests
        working-directory: frontend
        env:
          DEPLOY_TARGET: aws
        run: npm run smoke

      - name: Build frontend
        working-directory: frontend
        env:
          DEPLOY_TARGET: aws
          NODE_ENV: production
          VITE_API_BASE_URL: /api
        run: npm run build

  deploy-backend:
    needs: backend-test
    # Only deploy on pushes to main (not PRs), and only if backend-test was successful
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install EB CLI
        run: |
          python -m pip install --upgrade pip
          pip install awsebcli

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Deploy to Elastic Beanstalk
        run: |
          cd backend
          if ! eb deploy Agriscanpro-backend-env --timeout 10; then
            echo "=== Deployment failed — fetching instance logs ==="
            eb logs --all 2>&1 | head -300 || true
            if [ -d .elasticbeanstalk/logs/latest ]; then
              echo "=== Saved EB log files ==="
              find .elasticbeanstalk/logs/latest -maxdepth 2 -type f | sort
              echo "=== eb-engine.log ==="
              find .elasticbeanstalk/logs/latest -name 'eb-engine.log' -exec sh -c 'for file do echo "--- $file ---"; tail -200 "$file"; done' sh {} + || true
              echo "=== web.stdout.log ==="
              find .elasticbeanstalk/logs/latest -name 'web.stdout.log' -exec sh -c 'for file do echo "--- $file ---"; tail -200 "$file"; done' sh {} + || true
              echo "=== web.stderr.log ==="
              find .elasticbeanstalk/logs/latest -name 'web.stderr.log' -exec sh -c 'for file do echo "--- $file ---"; tail -200 "$file"; done' sh {} + || true
            fi
            exit 1
          fi

  deploy-frontend:
    needs: frontend-test
    # Only deploy on pushes to main (not PRs), and only if frontend-test was successful
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: frontend

      - name: Build (Static — AWS target)
        run: npx vite build
        working-directory: frontend
        env:
          DEPLOY_TARGET: aws
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          NODE_ENV: production

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'ap-southeast-1' }}

      - name: Sync Assets to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ secrets.S3_FRONTEND_BUCKET }}/ \
            --delete \
            --exclude "index.html" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Upload index.html to S3
        run: |
          aws s3 cp frontend/dist/index.html \
            s3://${{ secrets.S3_FRONTEND_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Deployment Summary
        run: |
          echo "Frontend deployed to S3 bucket: ${{ secrets.S3_FRONTEND_BUCKET }}"
          echo "CloudFront cache invalidated for distribution: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}"
