name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pip-audit

      - name: Run dependency scan (backend)
        working-directory: backend
        run: |
          # Continue on error so we don't instantly break the build if vulnerable deps exist.
          pip-audit || echo "::warning::pip-audit found vulnerabilities"

      - name: Run backend tests
        working-directory: backend
        env:
          DB_ENGINE: sqlite
          DEBUG: "False"
          USE_LOCAL_MEMORY_CACHE: "True"
        run: |
          python manage.py test accounts.tests core.tests samples.tests

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run dependency scan (frontend)
        working-directory: frontend
        run: npm audit --audit-level=high || echo "::warning::npm audit found vulnerabilities"

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Run frontend smoke tests
        working-directory: frontend
        env:
          DEPLOY_TARGET: aws
        run: npm run smoke

      - name: Build frontend
        working-directory: frontend
        env:
          DEPLOY_TARGET: aws
          NODE_ENV: production
          VITE_API_BASE_URL: /api
        run: npm run build
